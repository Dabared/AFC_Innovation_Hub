    toastDeleteError: "நீக்க முடியவில்லை: ",
    attachmentPrefix: "📎 ",
    status: { Draft: "வரைவு", Submitted: "சமர்ப்பிக்கப்பட்டது", Approved: "அங்கீகரிக்கப்பட்டது", Rejected: "நிராகரிக்கப்பட்டது", "Needs Revision": "திருத்தம் தேவை" },
  },
};

let lang = localStorage.getItem('twc_lang') || 'en';
function t(key){ return (LANGS[lang] && LANGS[lang][key] !== undefined) ? LANGS[lang][key] : LANGS.en[key]; }

let user = null;
let editingId = null;

function categoryOptions(selected){
  return STORE.categories().all().map(c=>`<option value="${c.id}" ${c.id===selected?'selected':''}>${escapeHtml(c.name)}</option>`).join('');
}

function langSwitchHtml(){
  return `<div class="lang-switch">
    ${Object.keys(LANGS).map(code => `<button type="button" class="${lang===code?'active':''}" onclick="setLang('${code}')">${LANGS[code].langName}</button>`).join('')}
  </div>`;
}

function setLang(code){
  lang = code;
  localStorage.setItem('twc_lang', code);
  document.body.classList.remove('lang-en','lang-si','lang-ta');
  document.body.classList.add('lang-'+code);
  // Update the existing topbar in place — do NOT call renderShell() again,
  // it inserts a fresh shell each time rather than replacing the current one.
  document.querySelector('.topbar__eyebrow').textContent = t('eyebrow');
  document.querySelector('.topbar__title').textContent = t('pageTitle');
  document.querySelector('.topbar__actions').innerHTML = langSwitchHtml();
  renderPage();
}

function renderPage(){
  const myIdeas = STORE.ideas().where(i=>i.authorId===user.id).sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));

  document.getElementById('content-mount').innerHTML = `
    <div class="two-pane" style="display:grid;grid-template-columns:1.15fr 0.85fr;gap:20px;align-items:start;">
      <div class="card card-pad">
        <div class="panel-head">
          <div><h3 id="form-title">${t('formTitleNew')}</h3><p>${t('formSubtitle')}</p></div>
        </div>
        <form id="idea-form" novalidate>
          <input type="hidden" id="idea-id">
          <div class="field" id="f-title">
            <label for="title">${t('labelTitle')}</label>
            <input class="input" id="title" placeholder="${escapeHtml(t('placeholderTitle'))}">
            <div class="error-text">${t('errorTitle')}</div>
          </div>
          <div class="field-row">
            <div class="field" id="f-category">
              <label for="category">${t('labelCategory')}</label>
              <select class="input" id="category"><option value="">${t('selectCategory')}</option>${categoryOptions()}</select>
              <div class="error-text">${t('errorCategory')}</div>
            </div>
            <div class="field" id="f-audience">
              <label for="audience">${t('labelAudience')}</label>
              <input class="input" id="audience" placeholder="${escapeHtml(t('placeholderAudience'))}">
              <div class="error-text">${t('errorAudience')}</div>
            </div>
          </div>
          <div class="field" id="f-challenge">
            <label for="challenge">${t('labelChallenge')}</label>
            <textarea class="input" id="challenge" placeholder="${escapeHtml(t('placeholderChallenge'))}"></textarea>
            <div class="error-text">${t('errorChallenge')}</div>
          </div>
          <div class="field" id="f-problem">
            <label for="problem">${t('labelProblem')}</label>
            <textarea class="input" id="problem" placeholder="${escapeHtml(t('placeholderProblem'))}"></textarea>
            <div class="error-text">${t('errorProblem')}</div>
          </div>
          <div class="field" id="f-solution">
            <label for="solution">${t('labelSolution')}</label>
            <textarea class="input" id="solution" placeholder="${escapeHtml(t('placeholderSolution'))}"></textarea>
            <div class="error-text">${t('errorSolution')}</div>
          </div>
          <div class="field">
            <label>${t('labelAttachment')}</label>
            <div class="file-drop" id="file-drop">${ICONS.paperclip} &nbsp;${t('attachmentHint')}</div>
            <input type="file" id="file-input" style="display:none;">
          </div>

          <div class="divider"></div>
          <div class="gap-8" style="justify-content:flex-end;">
            <button type="button" class="btn btn-danger" id="delete-btn" style="display:none;">${ICONS.trash} ${t('btnDelete')}</button>
            <button type="button" class="btn btn-outline" id="draft-btn">${t('btnDraft')}</button>
            <button type="submit" class="btn btn-primary" id="post-btn">${t('btnPost')}</button>
          </div>
        </form>
      </div>

      <div class="card card-pad">
        <div class="panel-head"><div><h3>${t('myIdeasTitle')}</h3><p>${t('myIdeasCount')(myIdeas.length)}</p></div></div>
        <div id="my-ideas-list">
          ${myIdeas.length===0 ? `<div class="empty-state">${ICONS.bulb}<h3>${t('emptyTitle')}</h3><p>${t('emptyDesc')}</p></div>` :
          myIdeas.map(i=>`
            <div class="card" style="padding:13px 14px;margin-bottom:10px;">
              <div class="flex-between" style="align-items:flex-start;">
                <div style="min-width:0;">
                  <div class="name-strong" style="font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;">${escapeHtml(i.title)}</div>
                  <div class="muted" style="font-size:11.5px;margin-top:2px;">${fmtDate(i.updatedAt)}</div>
                </div>
                <span class="pill pill-status-${i.status.toLowerCase().replace(' ','-')} hex-tag">${escapeHtml(t('status')[i.status] || i.status)}</span>
              </div>
              <div class="gap-8" style="margin-top:10px;">
                <button class="btn btn-ghost btn-sm" onclick="loadIdea('${i.id}')">${ICONS.edit} ${t('btnEdit')}</button>
                <button class="btn btn-ghost btn-sm" style="color:var(--rust)" onclick="deleteIdea('${i.id}')">${ICONS.trash} ${t('btnDeleteSmall')}</button>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>
  `;

  document.getElementById('idea-form').addEventListener('submit', (e)=>{ e.preventDefault(); guardedAction(()=>saveIdea('Submitted', e.submitter)); });
  document.getElementById('draft-btn').addEventListener('click', (e)=>{ guardedAction(()=>saveIdea('Draft', e.currentTarget)); });
  document.getElementById('delete-btn').addEventListener('click', ()=>{ if(editingId) deleteIdea(editingId); });
  document.getElementById('file-drop').addEventListener('click', ()=> document.getElementById('file-input').click());
  document.getElementById('file-input').addEventListener('change', (e)=>{
    const f = e.target.files[0];
    const drop = document.getElementById('file-drop');
    if(f){ drop.textContent = t('attachmentPrefix') + f.name; drop.classList.add('has-file'); drop.dataset.filename = f.name; }
  });
}

function clearErrors(){
  ['title','category','audience','challenge','problem','solution'].forEach(id=>{
    document.getElementById('f-'+id).classList.remove('invalid');
  });
}

function validate(){
  clearErrors();
  const vals = {
    title: document.getElementById('title').value.trim(),
    category: document.getElementById('category').value,
    audience: document.getElementById('audience').value.trim(),
    challenge: document.getElementById('challenge').value.trim(),
    problem: document.getElementById('problem').value.trim(),
    solution: document.getElementById('solution').value.trim(),
  };
  let valid = true;
  Object.entries(vals).forEach(([k,v])=>{
    if(!v){ document.getElementById('f-'+k).classList.add('invalid'); valid = false; }
  });
  return valid ? vals : null;
}

async function saveIdea(status, triggerBtn){
  // Draft only requires a title so users can save partial work.
  let vals;
  if(status === 'Draft'){
    const title = document.getElementById('title').value.trim();
    if(!title){ document.getElementById('f-title').classList.add('invalid'); toast(t('toastDraftTitleRequired'), 'error'); return; }
    vals = {
      title,
      category: document.getElementById('category').value,
      audience: document.getElementById('audience').value.trim(),
      challenge: document.getElementById('challenge').value.trim(),
      problem: document.getElementById('problem').value.trim(),
      solution: document.getElementById('solution').value.trim(),
    };
  } else {
    vals = validate();
    if(!vals){ toast(t('toastFillRequired'), 'error'); return; }
  }

  const attachmentName = document.getElementById('file-drop').dataset.filename || '';
  const payload = {
    title: vals.title, categoryId: vals.category, targetChallenge: vals.challenge,
    currentProblem: vals.problem, proposedSolution: vals.solution, targetAudience: vals.audience,
    attachmentName, authorId: user.id, department: user.department,
    status, updatedAt: STORE.nowISO(),
  };

  const submitBtns = document.querySelectorAll('#idea-form button');
  submitBtns.forEach(b => b.disabled = true);
  if(triggerBtn) setBtnBusy(triggerBtn, status==='Draft' ? 'Saving…' : 'Posting…');
  try{
    if(editingId){
      await STORE.ideas().update(editingId, payload);
      toast(status==='Draft' ? t('toastDraftUpdated') : t('toastIdeaPosted'), 'success');
    } else {
      payload.id = STORE.uid('idea'); payload.createdAt = STORE.nowISO();
      await STORE.ideas().insert(payload);
      toast(status==='Draft' ? t('toastDraftSaved') : t('toastIdeaPostedFeed'), 'success');
    }
    resetForm();
    renderPage();
  } catch(err){
    toast(t('toastSaveError') + (err.message||err), 'error');
    submitBtns.forEach(b=>b.disabled = false);
    if(triggerBtn) clearBtnBusy(triggerBtn);
  }
}

function loadIdea(id){
  const idea = STORE.ideas().find(id);
  if(!idea) return;
  editingId = id;
  document.getElementById('form-title').textContent = idea.status === 'Draft' ? t('formTitleEditDraft') : t('formTitleEdit');
  document.getElementById('title').value = idea.title;
  document.getElementById('category').value = idea.categoryId;
  document.getElementById('audience').value = idea.targetAudience;
  document.getElementById('challenge').value = idea.targetChallenge;
  document.getElementById('problem').value = idea.currentProblem;
  document.getElementById('solution').value = idea.proposedSolution;
  const drop = document.getElementById('file-drop');
  if(idea.attachmentName){ drop.textContent = t('attachmentPrefix') + idea.attachmentName; drop.classList.add('has-file'); drop.dataset.filename = idea.attachmentName; }
  document.getElementById('delete-btn').style.display = 'inline-flex';
  document.getElementById('post-btn').textContent = idea.status === 'Draft' ? t('btnPost') : t('btnSaveChanges');
  window.scrollTo({top:0, behavior:'smooth'});
}

function deleteIdea(id){
  const idea = STORE.ideas().find(id);
  confirmAction({
    title: t('deleteConfirmTitle'),
    message: t('deleteConfirmMsg')(idea.title, idea.status!=='Draft' ? t('deleteExtra') : ''),
    confirmLabel: t('btnConfirmDelete'), danger: true,
    onConfirm: ()=> guardedAction(async ()=>{
      try{
        await STORE.ideas().remove(id);
        const relComments = STORE.comments().where(c=>c.ideaId===id);
        const relRatings = STORE.ratings().where(r=>r.ideaId===id);
        const relReactions = STORE.reactions().where(r=>r.ideaId===id);
        for(const c of relComments) await STORE.comments().remove(c.id);
        for(const r of relRatings) await STORE.ratings().remove(r.id);
        for(const r of relReactions) await STORE.reactions().remove(r.id);
        if(editingId===id) resetForm();
        toast(t('toastDeleted'), 'success');
        renderPage();
      } catch(err){
        toast(t('toastDeleteError') + (err.message||err), 'error');
      }
    })
  });
}

function resetForm(){
  editingId = null;
  document.getElementById('idea-form').reset();
  const drop = document.getElementById('file-drop');
  if(drop){ drop.textContent = ICONS.paperclip + ' \u00a0' + t('attachmentHint'); drop.classList.remove('has-file'); drop.dataset.filename=''; }
  const del = document.getElementById('delete-btn'); if(del) del.style.display='none';
  const pb = document.getElementById('post-btn'); if(pb) pb.textContent = t('btnPost');
  const ft = document.getElementById('form-title'); if(ft) ft.textContent = t('formTitleNew');
}

bootPage(async ()=>{
  document.body.classList.add('lang-'+lang);
  user = renderShell({
    activePage:'idea-post.html', eyebrow:t('eyebrow'), title:t('pageTitle'),
    topbarActionsHtml: langSwitchHtml()
  });
  if(!user) return;
  renderPage();
});
</script>
</body>
</html>
